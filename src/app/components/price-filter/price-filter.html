<div class="filter-sidebar">
  <h3 class="sidebar-title">Filter Products</h3>
  
  <div class="filter-section">
    <label class="section-label">Search by Name</label>
    <input 
      type="text" 
      [(ngModel)]="searchName" 
      (input)="onFilterChange()" 
      placeholder="Enter product name..." 
      class="ikea-input"
    >
  </div>

  <div class="filter-section">
    <details open>
      <summary>Price Range</summary>
      <div class="price-flex">
        <input type="number" [(ngModel)]="minPrice" (input)="onFilterChange()" placeholder="From" class="ikea-input small">
        <input type="number" [(ngModel)]="maxPrice" (input)="onFilterChange()" placeholder="To" class="ikea-input small">
      </div>
    </details>
  </div>

  <button (click)="resetFilter()" class="reset-btn">Clear All</button>
</div>

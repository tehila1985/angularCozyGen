<app-top-menu></app-top-menu>
<div class="auth-container">
  <p-card [header]="isLoginMode ? 'Login' : 'Register'" class="auth-card">
    
    <p-message *ngIf="errorMessage" severity="error" [text]="errorMessage"></p-message>

    <form *ngIf="isLoginMode" (ngSubmit)="onLogin()" class="auth-form">
      <div class="field">
        <label for="login-email">Email</label>
        <input 
          pInputText 
          id="login-email" 
          type="email" 
          [(ngModel)]="loginData.email" 
          name="email"
          required
          class="w-full"
        />
      </div>

      <div class="field">
        <label for="login-password">Password</label>
        <p-password 
          [(ngModel)]="loginData.passwordHash" 
          name="password"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
          required
        ></p-password>
      </div>

      <p-button 
        label="Login" 
        type="submit" 
        styleClass="w-full"
        [disabled]="!loginData.email || !loginData.passwordHash"
      ></p-button>

      <div class="toggle-mode">
        <span>Don't have an account? </span>
        <a (click)="toggleMode()">Register here</a>
      </div>
    </form>
    <form *ngIf="!isLoginMode" (ngSubmit)="onRegister()" class="auth-form">
      <div class="field">
        <label for="register-firstName">First Name</label>
        <input 
          pInputText 
          id="register-firstName" 
          type="text" 
          [(ngModel)]="registerData.firstName" 
          name="firstName"
          required
          class="w-full"
        />
      </div>

      <div class="field">
        <label for="register-lastName">Last Name</label>
        <input 
          pInputText 
          id="register-lastName" 
          type="text" 
          [(ngModel)]="registerData.lastName" 
          name="lastName"
          required
          class="w-full"
        />
      </div>

      <div class="field">
        <label for="register-email">Email</label>
        <input 
          pInputText 
          id="register-email" 
          type="email" 
          [(ngModel)]="registerData.email" 
          name="email"
          required
          class="w-full"
        />
      </div>

      <div class="field">
        <label for="register-password">Password</label>
        <p-password 
          [(ngModel)]="registerData.passwordHash" 
          name="password"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
          required
        ></p-password>
      </div>

      <div class="field">
        <label for="register-phone">Phone</label>
        <input 
          pInputText 
          id="register-phone" 
          type="tel" 
          [(ngModel)]="registerData.phone" 
          name="phone"
          required
          class="w-full"
        />
      </div>

      <div class="field">
        <label for="register-address">Address</label>
        <input 
          pInputText 
          id="register-address" 
          type="text" 
          [(ngModel)]="registerData.address" 
          name="address"
          required
          class="w-full"
        />
      </div>

      <p-button 
        label="Register" 
        type="submit" 
        styleClass="w-full"
        [disabled]="!registerData.firstName || !registerData.lastName || !registerData.email || !registerData.passwordHash || !registerData.phone || !registerData.address"
      ></p-button>

      <div class="toggle-mode">
        <span>Already have an account? </span>
        <a (click)="toggleMode()">Login here</a>
      </div>
    </form>

  </p-card>
</div>

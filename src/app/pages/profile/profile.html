<app-top-menu></app-top-menu>
<div class="profile-container">
  <p-card header="Personal Area" class="profile-card">
    
    <div class="navigation-buttons">
      <p-button 
        label="Personal Details" 
        icon="pi pi-user"
        (onClick)="showPersonalDetails = true"
        [outlined]="!showPersonalDetails"
        styleClass="nav-btn"
      ></p-button>
      
      <p-button 
        label="Order History" 
        icon="pi pi-shopping-cart"
        (onClick)="goToOrderHistory()"
        [outlined]="true"
        styleClass="nav-btn"
      ></p-button>
    </div>

    <p-message *ngIf="successMessage" severity="success" [text]="successMessage"></p-message>
    <p-message *ngIf="errorMessage" severity="error" [text]="errorMessage"></p-message>

    <form *ngIf="showPersonalDetails" (ngSubmit)="onSave()" class="profile-form">
      <div class="field">
        <label for="firstName">First Name</label>
        <input 
          pInputText 
          id="firstName" 
          [(ngModel)]="editData.firstName" 
          name="firstName"
          required
          class="w-full"
        />
      </div>

      <div class="field">
        <label for="lastName">Last Name</label>
        <input 
          pInputText 
          id="lastName" 
          [(ngModel)]="editData.lastName" 
          name="lastName"
          required
          class="w-full"
        />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input 
          pInputText 
          id="email" 
          type="email"
          [(ngModel)]="editData.email" 
          name="email"
          required
          class="w-full"
        />
      </div>

      <div class="field">
        <label for="password">New Password (Optional)</label>
        <input 
          pInputText 
          id="password" 
          type="password"
          [(ngModel)]="editData.passwordHash" 
          name="password"
          placeholder="Leave empty if you don't want to change"
          class="w-full"
        />
      </div>

      <div class="field">
        <label for="phone">Phone</label>
        <input 
          pInputText 
          id="phone" 
          type="tel"
          [(ngModel)]="editData.phone" 
          name="phone"
          class="w-full"
        />
      </div>

      <div class="field">
        <label for="address">Address</label>
        <input 
          pInputText 
          id="address" 
          [(ngModel)]="editData.address" 
          name="address"
          class="w-full"
        />
      </div>

      <div class="button-group">
        <p-button 
          label="Save Changes" 
          type="submit" 
          styleClass="w-full"
        ></p-button>
        
        <p-button 
          label="Logout" 
          (onClick)="onLogout()"
          severity="secondary"
          styleClass="w-full"
        ></p-button>
      </div>
    </form>

  </p-card>
</div>
